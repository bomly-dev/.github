name: Feature request
description: Suggest a new capability or improvement for a Bomly project
labels: ["enhancement"]
body:
  - type: dropdown
    id: project
    attributes:
      label: Project
      description: Which Bomly project would this affect?
      options:
        - Bomly CLI
        - Bomly Guard
        - Plugin examples
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the use case or pain point, not just the proposed solution.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like Bomly to do? Include example commands, flags, workflow inputs, plugin behavior, or output if you have them in mind.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you've tried or considered, including existing workarounds.
    validations:
      required: false
